<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>authenticate</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #fafafa;
    font-family: 'Roboto Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .box {
    width: 340px;
  }
  .label {
    font-size: 13px;
    color: #9e9e9e;
    margin-bottom: 18px;
    letter-spacing: 0.04em;
  }
  input[type="password"] {
    width: 100%;
    border: none;
    border-bottom: 1.5px solid #212121;
    background: transparent;
    font-family: 'Roboto Mono', monospace;
    font-size: 15px;
    color: #212121;
    padding: 6px 0;
    outline: none;
    caret-color: #212121;
  }
  input[type="password"]::placeholder { color: #bdbdbd; }
  input[type="password"]:focus { border-bottom-color: #212121; }
  .error {
    margin-top: 12px;
    font-size: 11px;
    color: #c62828;
    letter-spacing: 0.03em;
  }
  button[type="submit"] {
    margin-top: 24px;
    background: #212121;
    color: #fff;
    border: none;
    font-family: 'Roboto Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 10px 28px;
    cursor: pointer;
  }
  button[type="submit"]:hover { background: #424242; }
</style>
</head>
<body>
<div class="box">
  <div class="label">authenticate:</div>
  <form method="POST">
    <input type="password" name="password" placeholder="password" autofocus autocomplete="current-password">
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <br>
    <button type="submit">enter</button>
  </form>
</div>
</body>
</html>
